<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Isopod of Truth (VR Scheduler)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e5e5e5;
            font-family: 'Courier New', Courier, monospace;
            overflow: auto; /* Allow scrolling if layout wraps */
            display: flex;
            flex-wrap: wrap; /* Allow controls to wrap above/below arena */
            align-items: center;
            justify-content: center;
            min-h-screen: 100vh;
            gap: 40px; /* Space between controls and arena */
            padding: 20px;
        }

        #controls {
            position: relative; /* Changed from absolute to flow with layout */
            width: 300px;
            z-index: 100;
            background: rgba(31, 41, 55, 0.95);
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        #arena {
            position: relative;
            width: 600px;
            height: 600px;
            background: #2a2a2a;
            border-radius: 50%;
            border: 8px solid #444;
            box-shadow: inset 0 0 50px #000;
            overflow: visible; /* Allow names to pop out */
            flex-shrink: 0; /* Prevent arena from squishing */
        }

        .burrow {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #111;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #333;
            z-index: 10;
        }

        .student-name {
            position: absolute;
            width: 150px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #888;
            pointer-events: none;
            text-shadow: 0 1px 2px black;
            transition: all 0.3s;
        }

        .burrow.selected {
            border-color: #00ff00;
            background: #003300;
            box-shadow: 0 0 20px #00ff00;
        }

        .burrow.selected .student-name {
            color: #00ff00;
            font-size: 20px;
            z-index: 50;
        }

        #isopod {
            position: absolute;
            width: 20px;
            height: 30px;
            background: #a0a0a0;
            border-radius: 10px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: transform 0.1s linear; /* Smooth rotation */
        }

        /* Segmentation lines on the isopod */
        #isopod::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 4px,
                #666 5px,
                #666 6px
            );
            border-radius: 10px;
        }

        /* Little antennae */
        #isopod::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            width: 1px;
            height: 8px;
            background: #a0a0a0;
            box-shadow: -4px 0 0 #a0a0a0, 4px 0 0 #a0a0a0; /* Fake 2nd antenna via shadow */
        }
    </style>
</head>
<body>

    <div id="controls">
        <h1 class="text-xl font-bold mb-2 text-green-500">The Isopod of Truth</h1>
        
        <p class="text-xs text-gray-400 mb-4">Paste student roster (one per line):</p>
        <!-- Manual Input Restored -->
        <textarea id="roster" class="w-full h-32 bg-gray-900 border border-gray-600 rounded p-2 text-sm text-white mb-4 placeholder-gray-600" placeholder="Student A&#10;Student B&#10;Student C..."></textarea>

        <div class="flex gap-2 flex-col">
            <button onclick="setupArena()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm w-full font-bold">1. Populate Arena</button>
            <button onclick="releaseIsopod()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm w-full font-bold">2. Release!</button>
        </div>
        <p id="status" class="mt-4 text-center text-yellow-500 font-mono h-6 text-sm"></p>
    </div>

    <div id="arena">
        <div id="isopod" style="display:none;"></div>
    </div>

    <script>
        let students = [];
        let burrows = [];
        const arenaRadius = 260; 
        const arenaCenter = 300;
        let isopodX = 300;
        let isopodY = 300;
        let isopodAngle = 0;
        let isRunning = false;

        function setupArena() {
            const rosterInput = document.getElementById('roster');
            
            // Manual Mode Only
            const rawText = rosterInput.value;
            students = rawText.split('\n').filter(n => n.trim() !== '');

            const arena = document.getElementById('arena');
            
            // Clear existing burrows
            const existing = document.querySelectorAll('.burrow');
            existing.forEach(e => e.remove());
            burrows = [];

            if (students.length === 0) {
                alert("Please enter student names first.");
                return;
            }

            // Distribute students
            const angleStep = (2 * Math.PI) / students.length;

            students.forEach((name, index) => {
                const angle = index * angleStep;
                const x = arenaCenter + arenaRadius * Math.cos(angle);
                const y = arenaCenter + arenaRadius * Math.sin(angle);

                const burrow = document.createElement('div');
                burrow.className = 'burrow';
                burrow.style.left = `${x}px`;
                burrow.style.top = `${y}px`;
                burrow.id = `burrow-${index}`;

                const label = document.createElement('div');
                label.className = 'student-name';
                label.innerText = name;
                
                // Position label outside the burrow
                const labelDist = 50;
                label.style.transform = `translate(${labelDist * Math.cos(angle)}px, ${labelDist * Math.sin(angle)}px)`;
                
                burrow.appendChild(label);
                arena.appendChild(burrow);

                burrows.push({
                    x: x,
                    y: y,
                    element: burrow,
                    name: name
                });
            });

            // Reset Isopod
            const iso = document.getElementById('isopod');
            iso.style.display = 'block';
            iso.style.left = '300px';
            iso.style.top = '300px';
            isopodX = 300;
            isopodY = 300;
            document.getElementById('status').innerText = "Isopod Ready.";
        }

        function releaseIsopod() {
            if (isRunning || students.length === 0) return;
            isRunning = true;
            document.getElementById('status').innerText = "Seeking shelter...";
            
            // Remove previous selections
            document.querySelectorAll('.burrow').forEach(b => b.classList.remove('selected'));

            let steps = 0;
            const maxSteps = 100 + Math.random() * 100; // Random duration
            let velocity = 5;

            const interval = setInterval(() => {
                steps++;

                // Brownian Motion with a tendency to speed up
                const randomTurn = (Math.random() - 0.5) * 1.5; // Random turn
                isopodAngle += randomTurn;

                // Move
                isopodX += Math.cos(isopodAngle) * velocity;
                isopodY += Math.sin(isopodAngle) * velocity;

                // Boundary check (Bounce soft)
                const distFromCenter = Math.sqrt(Math.pow(isopodX - 300, 2) + Math.pow(isopodY - 300, 2));
                if (distFromCenter > 220) {
                    isopodAngle += Math.PI; // Turn around if getting too close to edge before end
                }

                // Visual Update
                const iso = document.getElementById('isopod');
                iso.style.left = `${isopodX}px`;
                iso.style.top = `${isopodY}px`;
                iso.style.transform = `translate(-50%, -50%) rotate(${isopodAngle + 1.57}rad)`; // +1.57 to orient head

                // End condition
                if (steps > maxSteps) {
                    clearInterval(interval);
                    selectWinner();
                }
            }, 30);
        }

        function selectWinner() {
            // Find closest burrow
            let closestDist = Infinity;
            let winner = null;

            burrows.forEach(b => {
                const dist = Math.sqrt(Math.pow(isopodX - b.x, 2) + Math.pow(isopodY - b.y, 2));
                if (dist < closestDist) {
                    closestDist = dist;
                    winner = b;
                }
            });

            // Dash to the winner
            const iso = document.getElementById('isopod');
            
            // Animate dash
            iso.style.transition = "all 0.5s ease-in";
            iso.style.left = `${winner.x}px`;
            iso.style.top = `${winner.y}px`;
            
            // Calculate angle to winner
            const dx = winner.x - isopodX;
            const dy = winner.y - isopodY;
            const finalAngle = Math.atan2(dy, dx);
            iso.style.transform = `translate(-50%, -50%) rotate(${finalAngle + 1.57}rad)`;

            setTimeout(() => {
                winner.element.classList.add('selected');
                document.getElementById('status').innerText = `SELECTED: ${winner.name.toUpperCase()}`;
                isRunning = false;
                iso.style.transition = "transform 0.1s linear"; // Reset transition
            }, 500);
        }
    </script>
</body>
</html>
