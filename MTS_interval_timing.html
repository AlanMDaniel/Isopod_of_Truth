<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staddon & Higa MTS Model</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#070c07] min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
          const [targetTime, setTargetTime] = useState(1500);
          const [isPlaying, setIsPlaying] = useState(false);
          const [elapsedTime, setElapsedTime] = useState(0);
          const [traceValue, setTraceValue] = useState(100);
          const [reactionTimes, setReactionTimes] = useState([]);
          
          const canvasRef = useRef(null);
          const animationRef = useRef(null);
          const startTimeRef = useRef(null);

          const decayRate = 0.002; 
          const storedThreshold = 100 / (1 + decayRate * targetTime);
          const noiseAmplitude = 8;

          const drawOscilloscope = (ctx, width, height, currentTrace, elapsed) => {
            ctx.clearRect(0, 0, width, height);
            
            ctx.fillStyle = '#070c07';
            ctx.fillRect(0, 0, width, height);
            
            ctx.strokeStyle = '#1a6010';
            ctx.lineWidth = 1;
            for (let i = 0; i < width; i += 40) {
              ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
            }
            for (let i = 0; i < height; i += 40) {
              ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke();
            }

            const thresholdY = height - (storedThreshold / 100) * height;
            const noiseAmpPixels = (noiseAmplitude / 100) * height;

            // Draw the noise envelope around the stored threshold
            ctx.fillStyle = 'rgba(255, 179, 0, 0.15)'; 
            ctx.fillRect(0, thresholdY - noiseAmpPixels, width, noiseAmpPixels * 2);

            ctx.strokeStyle = '#ffb300'; 
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(0, thresholdY);
            ctx.lineTo(width, thresholdY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#ffb300';
            ctx.font = '12px monospace';
            ctx.fillText(`Stored Threshold (Reinforcement State)`, 10, thresholdY - 10);

            const maxTimeOnX = 4000; 

            // Draw the clean, deterministic Decaying Trace
            ctx.strokeStyle = '#3dff1a'; 
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            for (let t = 0; t <= elapsed; t += 20) {
              const x = (t / maxTimeOnX) * width;
              const v = 100 / (1 + decayRate * t);
              const y = height - (v / 100) * height;
              
              if (t === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.stroke();

            const currentX = (elapsed / maxTimeOnX) * width;
            const currentY = height - (currentTrace / 100) * height;
            
            if (elapsed > 0) {
              ctx.fillStyle = '#ffffff';
              ctx.beginPath();
              ctx.arc(currentX, currentY, 5, 0, Math.PI * 2);
              ctx.fill();
              ctx.shadowBlur = 15;
              ctx.shadowColor = '#3dff1a';
              ctx.fill();
              ctx.shadowBlur = 0;
            }

            ctx.strokeStyle = 'rgba(61, 255, 26, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let t = elapsed; t <= maxTimeOnX; t += 20) {
              const x = (t / maxTimeOnX) * width;
              const v = 100 / (1 + decayRate * t);
              const y = height - (v / 100) * height;
              if (t === elapsed) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.stroke();
          };

          const drawHistogram = (ctx, width, height) => {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#0c130c';
            ctx.fillRect(0, 0, width, height);

            if (reactionTimes.length === 0) return;

            const bins = 40;
            const maxT = 4000;
            const binWidth = width / bins;
            const counts = new Array(bins).fill(0);

            reactionTimes.forEach(rt => {
              const binIdx = Math.min(bins - 1, Math.floor((rt / maxT) * bins));
              counts[binIdx]++;
            });

            const maxCount = Math.max(...counts, 1);

            counts.forEach((c, i) => {
              if (!c) return;
              const bh = (c / maxCount) * height * 0.8;
              const x = i * binWidth;
              const frac = i / (bins - 1);
              
              ctx.fillStyle = `rgba(61, 255, 26, ${0.4 + 0.6 * frac})`;
              ctx.fillRect(x + 1, height - bh, binWidth - 2, bh);
            });

            const tx = (targetTime / maxT) * width;
            ctx.strokeStyle = '#ff3b3b';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(tx, 0); ctx.lineTo(tx, height); ctx.stroke();
            ctx.setLineDash([]);
          };

          const updateSimulation = (timestamp) => {
            if (!startTimeRef.current) startTimeRef.current = timestamp;
            const elapsed = timestamp - startTimeRef.current;
            
            const currentV = 100 / (1 + decayRate * elapsed);
            const momentNoise = (Math.random() - 0.5) * noiseAmplitude;
            const effectiveThreshold = storedThreshold + momentNoise;
            
            setElapsedTime(elapsed);
            setTraceValue(currentV);

            const canvas = canvasRef.current;
            if (canvas) drawOscilloscope(canvas.getContext('2d'), canvas.width, canvas.height, currentV, elapsed);

            if (currentV <= effectiveThreshold && isPlaying) {
              setIsPlaying(false);
              setReactionTimes(prev => [...prev, elapsed]);
            } else if (elapsed < 4000 && isPlaying) {
              animationRef.current = requestAnimationFrame(updateSimulation);
            } else if (isPlaying) {
              setIsPlaying(false); 
            }
          };

          useEffect(() => {
            if (isPlaying) {
              animationRef.current = requestAnimationFrame(updateSimulation);
            }
            return () => cancelAnimationFrame(animationRef.current);
          }, [isPlaying]);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (canvas && !isPlaying && elapsedTime === 0) {
              drawOscilloscope(canvas.getContext('2d'), canvas.width, canvas.height, 100, 0);
            }
            
            const histCanvas = document.getElementById('histCanvas');
            if (histCanvas) {
              drawHistogram(histCanvas.getContext('2d'), histCanvas.width, histCanvas.height);
            }
          }, [targetTime, reactionTimes]);

          const handleStart = () => {
            setElapsedTime(0);
            setTraceValue(100);
            startTimeRef.current = null;
            setIsPlaying(true);
          };

          const handleReset = () => {
            setReactionTimes([]);
            setElapsedTime(0);
            setTraceValue(100);
          };

          return (
            <div className="flex flex-col items-center justify-center p-6 bg-[#070c07] min-h-screen font-mono text-[#b8ddb8]">
              <div className="bg-[#0c130c] p-6 rounded-xl shadow-[0_0_20px_rgba(61,255,26,0.1)] w-full max-w-5xl border border-[#1c301c]">
                
                <div className="mb-6 border-b border-[#1c301c] pb-4">
                  <h1 className="text-3xl font-bold text-[#3dff1a] mb-2 uppercase tracking-widest">Multiple Time-Scale (MTS) Model</h1>
                  <p className="text-[#3a5a3a] text-sm leading-relaxed font-sans">
                    Based on Staddon & Higa (1999). Organisms do not use an internal clock to time intervals. A stimulus triggers a memory trace that decays according to a power law. The animal learns the degraded state of the trace at the moment of reinforcement. When the current decaying trace drops to match that stored threshold, a response is emitted.
                  </p>
                </div>

                <div className="flex gap-6 mb-6">
                  <div className="flex-1 bg-[#070c07] p-4 border border-[#1c301c] rounded flex flex-col justify-center">
                    <label className="text-[#ffb300] text-sm uppercase mb-2 block">Set Target Interval (Reinforcement Time)</label>
                    <div className="flex items-center gap-4">
                      <input 
                        type="range" 
                        min="500" max="3500" step="100" 
                        value={targetTime}
                        onChange={(e) => {
                          setTargetTime(Number(e.target.value));
                          if (!isPlaying) { setElapsedTime(0); setTraceValue(100); }
                        }}
                        disabled={isPlaying}
                        className="flex-1 accent-[#ffb300]"
                      />
                      <span className="text-[#ffb300] font-bold w-16 text-right">{targetTime}ms</span>
                    </div>
                    <div className="text-xs text-[#3a5a3a] mt-2">
                      Longer intervals require the animal to wait for a weaker memory trace.
                    </div>
                  </div>
                  
                  <div className="flex gap-4 items-center">
                    <button 
                      onClick={handleStart}
                      disabled={isPlaying}
                      className="px-6 py-4 bg-[#1a6010] hover:bg-[#3dff1a] hover:text-[#070c07] text-[#3dff1a] border border-[#3dff1a] font-bold uppercase transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      Deliver Stimulus
                    </button>
                    <button 
                      onClick={handleReset}
                      className="px-6 py-4 bg-transparent border border-[#ff3b3b] text-[#ff3b3b] hover:bg-[#ff3b3b] hover:text-[#070c07] font-bold uppercase transition-all"
                    >
                      Clear Data
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-3 gap-6">
                  <div className="col-span-2 relative bg-[#070c07] border border-[#1c301c] rounded overflow-hidden h-80">
                    <canvas ref={canvasRef} width={600} height={320} className="w-full h-full" />
                    <div className="absolute top-2 right-2 text-right">
                      <div className="text-xs text-[#3a5a3a] uppercase">Current Trace Strength</div>
                      <div className="text-2xl text-[#3dff1a] font-bold">{traceValue.toFixed(2)}</div>
                    </div>
                  </div>

                  <div className="col-span-1 bg-[#070c07] border border-[#1c301c] rounded flex flex-col p-4">
                    <div className="text-xs text-[#3a5a3a] uppercase mb-2">Response Distribution (Weber's Law)</div>
                    <div className="flex-1 relative w-full h-full">
                      <canvas id="histCanvas" width={250} height={200} className="w-full h-full" />
                    </div>
                    <div className="text-xs text-[#ff3b3b] mt-2 text-center uppercase tracking-widest border-t border-[#1c301c] pt-2">
                      n = {reactionTimes.length} Responses
                    </div>
                  </div>
                </div>
                
                <div className="mt-4 p-4 bg-[#1c301c]/30 border-l-4 border-[#3dff1a] text-sm font-sans text-[#b8ddb8]">
                  <strong className="text-[#3dff1a] font-mono uppercase tracking-wider block mb-1">Theoretical Takeaway</strong>
                  Notice how the physiological variance is represented by the fuzzy band around the stored threshold. Because the hyperbolic decay curve flattens over time, the clean memory trace slices quickly through the threshold band at short intervals, but lingers inside it at longer intervals. The right-skewed, scalar distribution of reaction times emerges natively from this geometry.
                </div>

              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
